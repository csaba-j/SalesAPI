services:
  nginx:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: ./php
    volumes:
      - ../:/var/www/html
    working_dir: /var/www/html

  php-cli:
    build:
      context: ./php
    volumes:
      - ../:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["php"]
    profiles:
      - cli
